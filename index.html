<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tactical Compass</title>
  <link rel="manifest" href="manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="TacCompass">
  <meta name="theme-color" content="#06080c">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap');

:root {
  --bg:     #06080c;
  --red:    #ff2020;
  --green:  #00e676;
  --yellow: #ffd600;
  --orange: #ff8c00;
  --white:  #ffffff;
  --muted:  #3a4459;
  --dim:    #0d1117;
  --F: 'Bebas Neue', sans-serif;
  --M: 'Share Tech Mono', monospace;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

html, body {
  background: var(--bg);
  color: var(--white);
  height: 100dvh;
  overflow: hidden;
  position: fixed;
  width: 100%;
  font-family: var(--F);
  display: flex;
  flex-direction: column;
}

/* ══ SEMAPHORE BG ══════════════════════════════════ */
#sem-bg {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 2;
  transition: background 0.5s, opacity 0.5s;
  opacity: 0;
}

/* ══ SCREENS ═══════════════════════════════════════ */
.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  z-index: 3;
  background: transparent;
  transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
}
.screen.off {
  transform: translateX(-100%);
  opacity: 0;
  pointer-events: none;
}

/* ══════════════════════════════════════════════════
   SCREEN 1 — PRE-START
   Layout: 5 rows, cada una flex con height %
══════════════════════════════════════════════════ */
#s1 { background: transparent; }

/* Row 1 — top bar (GPS + nav buttons) */
.r1 {
  flex: 0 0 9vh;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  border-bottom: 1px solid #0d1117;
  background: rgba(6,8,12,0.9);
}
.gps-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--M); font-size: 11px; color: var(--muted);
  letter-spacing: 1px;
}
.gps-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--green); animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
.r1-title { font-size: 16px; letter-spacing: 6px; color: #1f2937; text-align:center; }
.r1-btns { display:flex; gap:8px; justify-content:flex-end; }

.hbtn {
  border-radius: 10px;
  border: 2px solid;
  font-family: var(--F);
  font-size: 16px;
  letter-spacing: 2px;
  padding: 6px 14px;
  cursor: pointer;
  background: transparent;
}
.hbtn-reset { color: var(--orange); border-color: #3d2200; }
.hbtn-reset:active { background: rgba(255,140,0,.15); }
.hbtn-tac   { color: var(--green);  border-color: #153d15; }
.hbtn-tac:active { background: rgba(0,230,118,.12); }
.hbtn-back  { color: var(--yellow); border-color: #3d3000; }
.hbtn-back:active { background: rgba(255,214,0,.12); }

/* Row 2 — TIMER (big) */
.r2 {
  flex: 0 0 28vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  padding: 6px 14px;
  position: relative;
  background: transparent;
}
.r2-lbl { font-family:var(--M); font-size:10px; letter-spacing:5px; color:var(--muted); }

#timer {
  font-family: var(--F);
  font-size: clamp(88px, 25vw, 130px);
  line-height: .95;
  letter-spacing: 3px;
  color: var(--white);
  cursor: pointer;
  transition: color .3s;
  text-shadow: 0 0 40px rgba(255,255,255,.1);
  user-select: none;
}
#timer.warn   { color: var(--orange); text-shadow: 0 0 40px rgba(255,140,0,.4); }
#timer.danger { color: var(--red); text-shadow: 0 0 40px rgba(255,32,32,.5); animation: flash .5s infinite; }
@keyframes flash { 0%,100%{opacity:1} 50%{opacity:.65} }
.r2-hint { font-family:var(--M); font-size:9px; color:#151e2d; letter-spacing:2px; }

.timer-row {
  display: flex; align-items: center; gap: 12px;
  margin-top: 8px;
}
.tadj {
  width: 64px; height: 48px;
  background: #0d1117; border: 1px solid #1f2937;
  color: #9ca3af; font-family: var(--M); font-size: 15px;
  border-radius: 10px; cursor: pointer; letter-spacing: 1px;
}
.tadj:active { background: #1f2937; }

#btn-start {
  height: 52px; padding: 0 36px;
  background: #00c853; border: none;
  color: #000; font-family: var(--F);
  font-size: 26px; letter-spacing: 4px;
  border-radius: 12px; cursor: pointer;
  box-shadow: 0 0 28px rgba(0,200,83,.35);
  transition: background .2s, box-shadow .2s, color .2s;
}
#btn-start.running {
  background: var(--red); color: #fff;
  box-shadow: 0 0 28px rgba(255,32,32,.35);
}
#btn-start:active { opacity:.85; }

/* Row 3 — STATUS BADGE */
.r3 {
  flex: 0 0 15vh;
  display: flex; align-items: center;
  margin: 0 14px;
  border-radius: 18px;
  padding: 0 20px;
  background: #080c12;
  border: 2px solid #111827;
  transition: background .4s, border-color .4s;
  gap: 12px;
}
.r3.s-early { background: rgba(255,32,32,.1);  border-color: rgba(255,32,32,.5); }
.r3.s-ok    { background: rgba(0,230,118,.08); border-color: rgba(0,230,118,.5); }
.r3.s-late  { background: rgba(255,140,0,.1);  border-color: rgba(255,140,0,.5); }
.r3.s-ocs   { background: rgba(255,32,32,.18); border-color: var(--red); }

#status-word {
  font-size: clamp(36px, 11vw, 52px);
  letter-spacing: 3px; color: var(--muted);
  white-space: nowrap;
  transition: color .3s;
  flex-shrink: 0;
}
.r3.s-early #status-word { color: var(--red); }
.r3.s-ok    #status-word { color: var(--green); }
.r3.s-late  #status-word { color: var(--orange); }
.r3.s-ocs   #status-word { color: var(--red); }

.status-meta {
  flex: 1;
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 2px;
}
#status-detail { font-family:var(--M); font-size:12px; color:var(--muted); letter-spacing:1px; text-align:right; line-height:1.5; }
#eta-line      { font-family:var(--M); font-size:14px; color:#2d3748; letter-spacing:1px; }

/* Row 4 — LINE MARKS + DISTANCE */
.r4 {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 10px;
  padding: 10px 14px;
  min-height: 0;
  background: transparent;
}

.mark-btn {
  border-radius: 18px;
  border: 3px solid;
  background: transparent;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px;
  cursor: pointer;
  transition: background .3s, box-shadow .3s;
  padding: 10px;
}
.mark-btn.pin-btn { border-color: #3d1515; }
.mark-btn.rc-btn  { border-color: #153d15; }
.mark-btn.pin-btn.marked {
  border-color: var(--red);
  background: rgba(255,32,32,.08);
  box-shadow: 0 0 24px rgba(255,32,32,.2);
}
.mark-btn.rc-btn.marked {
  border-color: var(--green);
  background: rgba(0,230,118,.06);
  box-shadow: 0 0 24px rgba(0,230,118,.18);
}
.mark-name { font-size: clamp(32px, 10vw, 48px); letter-spacing: 4px; line-height: 1; }
.pin-btn .mark-name { color: var(--red); }
.rc-btn  .mark-name { color: var(--green); }
.mark-st { font-family:var(--M); font-size:11px; color:var(--muted); letter-spacing:1px; }
.pin-btn.marked .mark-st { color:var(--red); }
.rc-btn.marked  .mark-st { color:var(--green); }

/* Distance center */
.dist-panel {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #080c12;
  border: 1px solid #1a2030;
  border-radius: 16px;
  padding: 10px 10px;
  min-width: 84px;
  gap: 2px;
}
.dp-lbl { font-family:var(--M); font-size:9px; letter-spacing:3px; color:var(--muted); }
#dist-val {
  font-family: var(--F);
  font-size: clamp(34px, 10vw, 52px);
  line-height: 1; color: #2d3748;
  transition: color .3s;
  letter-spacing: 1px;
}
#dist-unit { font-family:var(--M); font-size:10px; color:var(--muted); letter-spacing:2px; }
#dist-side { font-family:var(--M); font-size:9px; color:var(--muted); letter-spacing:1px; text-align:center; margin-top:2px; }

/* Row 5 — SPEED */
.r5 {
  flex: 0 0 11vh;
  display: flex; align-items: center; justify-content: center;
  gap: 10px;
  padding: 0 14px 4px;
  border-top: 1px solid #0d1117;
  background: rgba(6,8,12,.85);
}
.r5-lbl { font-family:var(--M); font-size:11px; letter-spacing:4px; color:var(--muted); }
#approach-arrow { font-size:22px; color:var(--muted); transition:color .3s; }
#speed-val {
  font-family: var(--F);
  font-size: clamp(36px, 11vw, 56px);
  color: var(--green); line-height:1;
  letter-spacing: 2px;
}
.r5-unit { font-family:var(--M); font-size:12px; color:var(--muted); }

/* ══════════════════════════════════════════════════
   SCREEN 2 — TACTICAL
══════════════════════════════════════════════════ */
#s2 { background: transparent; transform: translateX(100%); opacity:1; }
#s2.off { transform: translateX(100%); opacity:1; }
#s2:not(.off) { transform: translateX(0); }

/* Tac row 1 — header */
.t1 {
  flex: 0 0 9vh;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 14px; gap: 8px;
  border-bottom: 1px solid #0d1117;
}
.t1-title { font-size:16px; letter-spacing:6px; color:#1f2937; text-align:center; }
.t1-left { display:flex; gap:8px; }
.t1-right { display:flex; gap:8px; justify-content:flex-end; }

/* GO strip */
#go-strip {
  flex: 0 0 0px;
  overflow: hidden;
  background: var(--green);
  text-align: center;
  font-size: 18px; letter-spacing: 8px; color: #000;
  display: flex; align-items: center; justify-content: center;
  transition: flex-basis .4s;
}
#go-strip.show { flex: 0 0 6vh; }

/* Tac heading — BIG */
.t2 {
  flex: 0 0 32vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
}
.t2-lbl { font-family:var(--M); font-size:10px; letter-spacing:6px; color:var(--muted); margin-bottom:-6px; }
#tac-heading {
  font-family: var(--F);
  font-size: clamp(100px, 32vw, 170px);
  line-height: .9; letter-spacing: 3px;
  text-shadow: 0 0 60px rgba(255,255,255,.07);
}

/* Tac shift */
.t3 {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  min-height: 0;
}
.shift-row { display:flex; align-items:center; gap:10px; }
#shift-arrow { font-size: clamp(30px,9vw,44px); color:var(--muted); transition:color .3s; }
#shift-num {
  font-family: var(--F);
  font-size: clamp(52px,16vw,80px);
  line-height:1; color:var(--muted);
  transition: color .3s;
}
.shift-deg { font-family:var(--M); font-size:16px; color:var(--muted); }
.shift-sub { font-family:var(--M); font-size:10px; color:var(--muted); letter-spacing:4px; margin-top:2px; }

/* Tac speed */
.t4 {
  flex: 0 0 10vh;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  border-top: 1px solid #0d1117;
}
#tac-spd {
  font-family: var(--F);
  font-size: clamp(38px,12vw,60px);
  color: var(--green); line-height:1; letter-spacing:2px;
}
.tac-spd-unit { font-family:var(--M); font-size:13px; color:var(--muted); }

/* Tac footer — PORT / STBD */
.t5 {
  flex: 0 0 22vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px 14px 14px;
}
.side-card {
  border-radius: 18px; border: 3px solid;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; position: relative;
  transition: all .25s;
}
.side-card.port-card { border-color: #3d1515; background: #0a0606; }
.side-card.stbd-card { border-color: #153d15; background: #060a06; }
.side-card.port-card.active {
  background: var(--red); border-color: var(--red);
  box-shadow: 0 0 32px rgba(255,45,45,.4);
}
.side-card.stbd-card.active {
  background: var(--green); border-color: var(--green);
  box-shadow: 0 0 32px rgba(0,230,118,.4);
}
.side-card.active .side-title,
.side-card.active .side-hdg,
.side-card.active .side-sub { color: #000 !important; }

.fav-badge {
  position:absolute; top:-10px; right:-6px;
  background:var(--yellow); color:#000;
  font-family:var(--M); font-size:9px; font-weight:700;
  padding:3px 8px; border-radius:12px; letter-spacing:1px;
  opacity:0; transition:opacity .3s;
}
.side-card.favored .fav-badge { opacity:1; }

.side-title { font-size:clamp(14px,4vw,20px); letter-spacing:5px; }
.port-card .side-title { color:var(--red); }
.stbd-card .side-title { color:var(--green); }
.side-hdg  { font-family:var(--F); font-size:clamp(36px,11vw,52px); color:#eee; line-height:1; }
.side-sub  { font-family:var(--M); font-size:10px; color:var(--muted); letter-spacing:2px; }

/* ══ COUNTDOWN OVERLAY ════════════════════════════ */
#go-overlay {
  position:fixed; inset:0;
  background:#000; z-index:200;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none;
  transition:opacity .3s;
}
#go-overlay.visible { opacity:1; pointer-events:all; }
#go-num  { font-family:var(--F); font-size:52vw; line-height:1; color:var(--yellow); }
#go-word { font-family:var(--F); font-size:32vw; letter-spacing:8px; color:var(--green); text-shadow:0 0 80px var(--green); display:none; }
</style>
</head>
<body>

<div id="sem-bg"></div>

<!-- ══════════ SCREEN 1: PRE-START ══════════ -->
<div class="screen" id="s1">

  <!-- R1: header -->
  <div class="r1">
    <div class="gps-badge">
      <div class="gps-dot"></div>
      <span id="gps-lbl">INIT</span>
    </div>
    <span class="r1-title">PRE-START</span>
    <div class="r1-btns">
      <button class="hbtn hbtn-reset" onclick="resetAll()">⟳ RESET</button>
      <button class="hbtn hbtn-tac"   onclick="goTac()">TAC →</button>
    </div>
  </div>

  <!-- R2: timer -->
  <div class="r2">
    <div class="r2-lbl">COUNTDOWN</div>
    <div id="timer" onclick="syncTimer()">05:00</div>
    <div class="r2-hint">↑ TAP = SYNC NEXT MIN</div>
    <div class="timer-row">
      <button class="tadj" onclick="adjTime(-60)">−1M</button>
      <button id="btn-start" onclick="toggleTimer()">START</button>
      <button class="tadj" onclick="adjTime(+60)">+1M</button>
    </div>
  </div>

  <!-- R3: status badge -->
  <div class="r3" id="r3">
    <span id="status-word">——</span>
    <div class="status-meta">
      <div id="status-detail">SET PIN &amp; RC<br>TO CALCULATE</div>
      <div id="eta-line"></div>
    </div>
  </div>

  <!-- R4: line marks -->
  <div class="r4">
    <button class="mark-btn pin-btn" id="btn-pin" onclick="markLine('PIN')">
      <span class="mark-name">PIN</span>
      <span class="mark-st" id="pin-st">TAP TO SET</span>
    </button>

    <div class="dist-panel">
      <span class="dp-lbl">DIST</span>
      <div id="dist-val">--</div>
      <div id="dist-unit">M</div>
      <div id="dist-side"></div>
    </div>

    <button class="mark-btn rc-btn" id="btn-rc" onclick="markLine('RC')">
      <span class="mark-name">RC</span>
      <span class="mark-st" id="rc-st">TAP TO SET</span>
    </button>
  </div>

  <!-- R5: speed -->
  <div class="r5">
    <span class="r5-lbl">SPD</span>
    <span id="approach-arrow">→</span>
    <span id="speed-val">0.0</span>
    <span class="r5-unit">KTS</span>
  </div>

</div>

<!-- ══════════ SCREEN 2: TACTICAL ══════════ -->
<div class="screen off" id="s2">

  <!-- T1: header -->
  <div class="t1">
    <div class="t1-left">
      <button class="hbtn hbtn-reset" onclick="resetAll()">⟳ RESET</button>
    </div>
    <span class="t1-title">TACTICAL</span>
    <div class="t1-right">
      <button class="hbtn hbtn-back" onclick="goPreStart()">← PRE</button>
    </div>
  </div>

  <!-- GO strip -->
  <div id="go-strip">🚩 GO — RACING</div>

  <!-- T2: heading -->
  <div class="t2">
    <div class="t2-lbl">HEADING</div>
    <div id="tac-heading">000°</div>
  </div>

  <!-- T3: shift -->
  <div class="t3">
    <div class="shift-row">
      <span id="shift-arrow">→</span>
      <span id="shift-num">--</span>
      <span class="shift-deg">°</span>
    </div>
    <span class="shift-sub">SHIFT</span>
  </div>

  <!-- T4: speed -->
  <div class="t4">
    <span id="tac-spd">0.0</span>
    <span class="tac-spd-unit">KTS</span>
  </div>

  <!-- T5: port / stbd -->
  <div class="t5">
    <div class="side-card port-card" id="card-port" onclick="selectSide('port')">
      <span class="fav-badge">FAVORED</span>
      <span class="side-title">PORT</span>
      <span class="side-hdg"  id="val-port">---°</span>
      <span class="side-sub"  id="sub-port">TAP TO SET</span>
    </div>
    <div class="side-card stbd-card" id="card-stbd" onclick="selectSide('stbd')">
      <span class="fav-badge">FAVORED</span>
      <span class="side-title">STBD</span>
      <span class="side-hdg"  id="val-stbd">---°</span>
      <span class="side-sub"  id="sub-stbd">TAP TO SET</span>
    </div>
  </div>

</div>

<!-- ══════════ COUNTDOWN OVERLAY ══════════ -->
<div id="go-overlay">
  <div id="go-num"></div>
  <div id="go-word">GO</div>
</div>

<script>
/* ══ STATE ══════════════════════════════════════════ */
const S = {
  sec:300, run:false,
  hdg:45, spd:0,
  lat:null, lon:null,
  pinLat:null, pinLon:null,
  rcLat:null, rcLon:null,
  pinSet:false, rcSet:false,
  dist:null, approachSpd:0,
  portRef:null, stbdRef:null, active:null,
  transitioned:false,
  // sim
  _sh:45, _sd:65, _sa:0.45
};

/* ══ GPS ════════════════════════════════════════════ */
function startGPS() {
  if (!navigator.geolocation) return;
  let pLat=null, pLon=null, pT=null;
  navigator.geolocation.watchPosition(p => {
    const {latitude:la,longitude:lo,heading:h,speed:sp} = p.coords;
    S.lat=la; S.lon=lo;
    if (h!=null&&!isNaN(h)) S.hdg=h;
    if (sp!=null) S.spd=sp*1.94384;
    if (pLat!=null && S.pinSet && S.rcSet) {
      const d1=dtl(pLat,pLon), d2=dtl(la,lo), dt=(p.timestamp-pT)/1000;
      if (dt>0) S.approachSpd=(d1-d2)/dt;
    }
    pLat=la; pLon=lo; pT=p.timestamp;
    document.getElementById('gps-lbl').textContent='LOCKED';
  }, null, {enableHighAccuracy:true, maximumAge:500});
}

/* ══ GEOMETRY ════════════════════════════════════════ */
const r = d => d*Math.PI/180;
function dtl(la,lo) {
  if (!S.pinSet||!S.rcSet) return null;
  const R=6371000;
  const [la1,lo1,la2,lo2,la0,lo0]=[r(S.pinLat),r(S.pinLon),r(S.rcLat),r(S.rcLon),r(la),r(lo)];
  const d13=2*Math.asin(Math.sqrt(Math.sin((la0-la1)/2)**2+Math.cos(la1)*Math.cos(la0)*Math.sin((lo0-lo1)/2)**2));
  const b13=Math.atan2(Math.sin(lo0-lo1)*Math.cos(la0),Math.cos(la1)*Math.sin(la0)-Math.sin(la1)*Math.cos(la0)*Math.cos(lo0-lo1));
  const b12=Math.atan2(Math.sin(lo2-lo1)*Math.cos(la2),Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(lo2-lo1));
  return Math.asin(Math.sin(d13)*Math.sin(b13-b12))*R;
}

/* ══ MARKS ══════════════════════════════════════════ */
function markLine(type) {
  const la=S.lat??(-34.5+Math.random()*.002), lo=S.lon??(-58.4+Math.random()*.002);
  if (type==='PIN') {
    S.pinSet=true; S.pinLat=la; S.pinLon=lo;
    document.getElementById('btn-pin').classList.add('marked');
    document.getElementById('pin-st').textContent=S.lat?'SET ✓':'SIM ✓';
  } else {
    S.rcSet=true; S.rcLat=la; S.rcLon=lo;
    document.getElementById('btn-rc').classList.add('marked');
    document.getElementById('rc-st').textContent=S.lat?'SET ✓':'SIM ✓';
  }
  updateUI();
}

/* ══ TIMER ══════════════════════════════════════════ */
function toggleTimer() {
  S.run=!S.run;
  const b=document.getElementById('btn-start');
  b.textContent=S.run?'STOP':'START';
  b.classList.toggle('running',S.run);
}
function syncTimer() {
  const n=Math.ceil((S.sec+1)/60)*60;
  S.sec=n>600?60:n; updateUI();
}
function adjTime(v) { S.sec=Math.max(0,Math.min(600,S.sec+v)); updateUI(); }

/* ══ STATUS CALC ════════════════════════════════════ */
function calcStatus() {
  if (!S.pinSet||!S.rcSet||!S.run) return null;
  const dist=S.lat!=null?dtl(S.lat,S.lon):S._sd;
  const appr=S.lat!=null?S.approachSpd:S._sa;
  if (dist<-5) return {state:'OCS', dist, tLine:null, diff:null};
  const tLine=appr>0.05?dist/appr:null;
  if (tLine===null) return {state:'STOPPED', dist, tLine:null, diff:null};
  const diff=tLine-S.sec;
  const state=Math.abs(diff)<=10?'ON TIME':diff<-10?'EARLY':'LATE';
  return {state, dist, tLine, diff};
}

/* ══ SIDE SELECT ════════════════════════════════════ */
function selectSide(side) {
  S.active=side;
  if (side==='port') { S.portRef=Math.round(S.hdg); document.getElementById('val-port').textContent=S.portRef+'°'; document.getElementById('sub-port').textContent='REF SET'; }
  else               { S.stbdRef=Math.round(S.hdg); document.getElementById('val-stbd').textContent=S.stbdRef+'°'; document.getElementById('sub-stbd').textContent='REF SET'; }
  document.getElementById('card-port').classList.toggle('active',side==='port');
  document.getElementById('card-stbd').classList.toggle('active',side==='stbd');
  updateUI();
}

/* ══ NAVIGATION ═════════════════════════════════════ */
function goTac() {
  document.getElementById('s1').classList.add('off');
  document.getElementById('s2').classList.remove('off');
}
function goPreStart() {
  document.getElementById('s2').classList.add('off');
  document.getElementById('s1').classList.remove('off');
}
function triggerGo() {
  if (S.transitioned) return;
  S.transitioned=true;
  const ov=document.getElementById('go-overlay');
  const nEl=document.getElementById('go-num');
  const gEl=document.getElementById('go-word');
  ov.classList.add('visible');
  let c=3; nEl.textContent=c;
  const t=setInterval(()=>{
    c--;
    if (c>0) { nEl.textContent=c; nEl.style.animation='none'; void nEl.offsetWidth; nEl.style.animation=''; }
    else {
      clearInterval(t);
      nEl.style.display='none'; gEl.style.display='block';
      setTimeout(()=>{
        ov.classList.remove('visible');
        document.getElementById('go-strip').classList.add('show');
        goTac();
        setTimeout(()=>document.getElementById('go-strip').classList.remove('show'),3500);
      },800);
    }
  },900);
}

function resetAll() {
  S.sec=300; S.run=false; S.pinSet=false; S.rcSet=false;
  S.portRef=null; S.stbdRef=null; S.active=null; S.transitioned=false;
  S._sd=65; S._sa=0.45; S.approachSpd=0;
  ['btn-pin','btn-rc'].forEach(id=>document.getElementById(id).classList.remove('marked'));
  document.getElementById('pin-st').textContent='TAP TO SET';
  document.getElementById('rc-st').textContent='TAP TO SET';
  document.getElementById('btn-start').textContent='START';
  document.getElementById('btn-start').classList.remove('running');
  document.getElementById('val-port').textContent='---°';
  document.getElementById('val-stbd').textContent='---°';
  document.getElementById('sub-port').textContent='TAP TO SET';
  document.getElementById('sub-stbd').textContent='TAP TO SET';
  ['card-port','card-stbd'].forEach(id=>document.getElementById(id).classList.remove('active','favored'));
  document.getElementById('go-num').style.display='block';
  document.getElementById('go-word').style.display='none';
  document.getElementById('go-strip').classList.remove('show');
  document.getElementById('sem-bg').style.cssText='';
  goPreStart();
  updateUI();
}

/* ══ UI UPDATE ══════════════════════════════════════ */
function updateUI() {
  // Timer
  const m=Math.floor(S.sec/60), s=S.sec%60;
  const tEl=document.getElementById('timer');
  tEl.textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  tEl.className=S.sec<=30&&S.run?'danger':S.sec<=90&&S.run?'warn':'';

  // Speed
  document.getElementById('speed-val').textContent=S.spd.toFixed(1);
  document.getElementById('tac-spd').textContent=S.spd.toFixed(1);
  const arr=document.getElementById('approach-arrow');
  const ap=S.lat!=null?S.approachSpd:S._sa;
  if (ap>0.3){arr.textContent='▲';arr.style.color='var(--green)';}
  else if(ap<-0.1){arr.textContent='▼';arr.style.color='var(--red)';}
  else{arr.textContent='→';arr.style.color='var(--muted)';}

  // Status
  const st=calcStatus();
  const badge=document.getElementById('r3');
  const sw=document.getElementById('status-word');
  const sd=document.getElementById('status-detail');
  const el=document.getElementById('eta-line');
  const sem=document.getElementById('sem-bg');
  const dv=document.getElementById('dist-val');
  const ds=document.getElementById('dist-side');

  if (!st) {
    badge.className='r3'; sw.textContent='——';
    sd.innerHTML='SET PIN &amp; RC<br>TO CALCULATE'; el.textContent='';
    sem.style.cssText='opacity:0';
    dv.textContent='--'; dv.style.color='#2d3748'; ds.textContent='';
  } else {
    const abs=Math.round(Math.abs(st.dist??0));
    // dist panel
    dv.textContent=abs;
    if ((st.dist??0)<-5){ dv.style.color='var(--red)'; ds.innerHTML='⚠ OCS'; ds.style.color='var(--red)'; }
    else if(abs<=5){ dv.style.color='var(--green)'; ds.innerHTML='ON LINE'; ds.style.color='var(--green)'; }
    else { dv.style.color='var(--white)'; ds.innerHTML=(st.dist??0)>0?'BELOW LINE':'OVER LINE'; ds.style.color='var(--muted)'; }

    if (st.state==='OCS'){
      sem.style.cssText='background:var(--red);opacity:.35';
      badge.className='r3 s-ocs'; sw.textContent='OCS!';
      sd.innerHTML=`${abs}m OVER LINE`; el.textContent='';
    } else if (st.state==='EARLY'){
      sem.style.cssText='background:var(--red);opacity:.18';
      badge.className='r3 s-early'; sw.textContent='EARLY';
      sd.innerHTML=`${Math.abs(Math.round(st.diff))}s BEFORE GUN<br>SLOW DOWN`;
      el.textContent=st.tLine!=null?`ETA ${Math.round(st.tLine)}s`:'';
    } else if (st.state==='ON TIME'){
      sem.style.cssText='background:var(--green);opacity:.15';
      badge.className='r3 s-ok'; sw.textContent='ON TIME';
      sd.innerHTML='PERFECT APPROACH';
      el.textContent=st.tLine!=null?`ETA ${Math.round(st.tLine)}s`:'';
    } else if (st.state==='LATE'){
      sem.style.cssText='background:var(--orange);opacity:.18';
      badge.className='r3 s-late'; sw.textContent='LATE';
      sd.innerHTML=`${Math.abs(Math.round(st.diff))}s AFTER GUN<br>SPEED UP`;
      el.textContent=st.tLine!=null?`ETA ${Math.round(st.tLine)}s`:'';
    } else {
      sem.style.cssText='opacity:0';
      badge.className='r3'; sw.textContent='——';
      sd.innerHTML='HOLD SPEED'; el.textContent='';
    }
  }

  // Tactical heading + shift
  document.getElementById('tac-heading').textContent=String(Math.round(S.hdg)).padStart(3,'0')+'°';
  const ref=S.active==='port'?S.portRef:S.stbdRef;
  if (ref!==null){
    let d=Math.round(S.hdg-ref);
    if(d>180)d-=360; if(d<-180)d+=360;
    const sn=document.getElementById('shift-num'), sa=document.getElementById('shift-arrow');
    sn.textContent=Math.abs(d);
    if(d>0){sn.style.color='var(--green)';sa.textContent='↗';sa.style.color='var(--green)';}
    else if(d<0){sn.style.color='var(--red)';sa.textContent='↙';sa.style.color='var(--red)';}
    else{sn.style.color='#fff';sa.textContent='→';sa.style.color='#fff';}
    if(S.active==='port') document.getElementById('sub-port').textContent=d>0?'LIFTED':d<0?'HEADED':'EVEN';
    if(S.active==='stbd') document.getElementById('sub-stbd').textContent=d<0?'LIFTED':d>0?'HEADED':'EVEN';
    document.getElementById('card-port').classList.toggle('favored',S.portRef!==null&&d<0&&S.active!=='port');
    document.getElementById('card-stbd').classList.toggle('favored',S.stbdRef!==null&&d>0&&S.active!=='stbd');
  }
}

/* ══ SIMULATION TICK ════════════════════════════════ */
setInterval(()=>{
  if(S.run&&S.sec>0){ S.sec--; if(S.sec===0&&!S.transitioned) triggerGo(); }
  if(S.lat==null){
    S._sh=((S._sh??45)+(Math.random()-.48)*2+360)%360;
    S.hdg=S._sh; S.spd=5.0+Math.random()*.8;
    if(S.pinSet&&S.rcSet&&S.run){ S._sa=0.4+Math.random()*.2; S._sd=Math.max(-15,S._sd-S._sa); }
  }
  updateUI();
},1000);

startGPS();
updateUI();

// Register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error:', e));
  });
}
</script>
