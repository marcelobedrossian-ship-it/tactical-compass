<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Tactical Compass</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TacCompass">
<meta name="theme-color" content="#000000">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap');

:root {
  --red:   #ff1a1a;
  --green: #00e676;
  --yel:   #ffd600;
  --ora:   #ff8c00;
  --dim:   #1c1c1c;
  --mut:   #555;
  --F: 'Black Ops One', cursive;
  --M: 'Share Tech Mono', monospace;
}

* { box-sizing:border-box; margin:0; padding:0;
    -webkit-tap-highlight-color:transparent; touch-action:manipulation; }

html, body {
  background:#000; color:#fff;
  height:100dvh; overflow:hidden;
  position:fixed; width:100%;
  font-family:var(--F);
}

/* ══ SEMAPHORE ══════════════════════════════════ */
#sem {
  position:fixed; inset:0; z-index:2;
  pointer-events:none; opacity:0;
  transition:background .4s, opacity .4s;
}

/* ══ SCREENS ════════════════════════════════════ */
.scr {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  z-index:3; background:transparent;
  transition:transform .28s cubic-bezier(.22,1,.36,1);
}
.scr.off { transform:translateX(-100%); pointer-events:none; }
#s2 { transform:translateX(100%); }
#s2:not(.off) { transform:translateX(0); }

/* ══ LANDSCAPE via JS-driven CSS class ══════════
   When JS detects landscape, body gets .land
   All landscape rules use .land prefix
════════════════════════════════════════════════ */

/* ══ SHARED MINI-HEADER ════════════════════════ */
.hdr {
  flex: 0 0 40px;
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; padding: 0 8px;
  background: #000; border-bottom: 1px solid var(--dim);
  z-index: 10;
}
.gps {
  display:flex; align-items:center; gap:5px;
  font-family:var(--M); font-size:10px; color:var(--mut);
}
.gdot {
  width:7px; height:7px; border-radius:50%;
  background:var(--green); animation:blink 2s infinite; flex-shrink:0;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.htit { font-size:11px; letter-spacing:4px; color:#252525; text-align:center; }
.hbtns { display:flex; gap:5px; justify-content:flex-end; }
.hlbtns { display:flex; gap:5px; }

.hb {
  border-radius:6px; border:1px solid;
  font-family:var(--F); font-size:14px; letter-spacing:1px;
  padding:3px 10px; cursor:pointer; background:#000;
}
.hb-r { color:var(--ora); border-color:#3a1a00; }
.hb-r:active { background:#1a0a00; }
.hb-g { color:var(--green); border-color:#0a3a1a; }
.hb-g:active { background:#051a0a; }
.hb-y { color:var(--yel); border-color:#3a3000; }
.hb-y:active { background:#1a1500; }

/* ══════════════════════════════════════════════
   PRE-START — layout container
══════════════════════════════════════════════ */
#pre-body {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

/* ── PORTRAIT pre-start ── */
/* ROW A: status + timer  ~67% */
.ra {
  flex: 0 0 67%; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2px 6px; gap: 0;
}

#sw {
  font-family: var(--F);
  font-size: clamp(34px, 10vw, 54px);
  letter-spacing: 2px; color: var(--mut);
  line-height: 1; text-align: center; width: 100%;
  transition: color .3s;
}
#sw.ok  { color: var(--green); }
#sw.ear { color: var(--red); }
#sw.lat { color: var(--ora); }
#sw.ocs { color: var(--red); animation: foc .4s infinite; }
@keyframes foc{0%,100%{opacity:1}50%{opacity:.3}}

#sd {
  font-family: var(--M);
  font-size: clamp(9px, 2.4vw, 13px);
  color: var(--mut); letter-spacing: 1px;
  text-align: center; line-height: 1.3; min-height: 1.6em;
}
#el {
  font-family: var(--M);
  font-size: clamp(10px, 2.6vw, 14px);
  color: #333; letter-spacing: 2px; text-align: center; margin-bottom: 2px;
}

.tlbl { font-family: var(--M); font-size: 9px; letter-spacing: 5px; color: #1e1e1e; }
#timer {
  font-family: var(--F);
  font-size: clamp(92px, 29vw, 164px);
  line-height: .86; color: #fff;
  cursor: pointer; user-select: none; transition: color .3s;
}
#timer.warn   { color: var(--ora); }
#timer.danger { color: var(--red); animation: fl .5s infinite; }
@keyframes fl{0%,100%{opacity:1}50%{opacity:.5}}
.thint { font-family:var(--M); font-size:8px; color:#181818; letter-spacing:2px; margin-top:1px; }

.trow { display:flex; align-items:center; gap:7px; margin-top:6px; }
.tadj {
  width:58px; height:50px;
  background:#111; border:1px solid #333;
  color:#fff; font-family:var(--F); font-size:18px;
  border-radius:9px; cursor:pointer;
}
.tadj:active { background:#222; }
#bst {
  height:54px; padding:0 28px;
  background:#00c853; border:none;
  color:#000; font-family:var(--F);
  font-size:26px; letter-spacing:2px;
  border-radius:11px; cursor:pointer;
  box-shadow:0 0 18px rgba(0,200,83,.45);
  transition:background .2s, color .2s, box-shadow .2s;
}
#bst.run { background:var(--red); color:#fff; box-shadow:0 0 18px rgba(255,26,26,.45); }
#bst:active { opacity:.85; }

/* ROW B: PIN / DIST / RC  ~21% */
.rb {
  flex: 0 0 21%;
  display: grid; grid-template-columns: 1fr auto 1fr;
  border-top: 2px solid var(--dim);
}

/* MARK BUTTONS — strong illumination when marked */
.mb {
  background: #000; border: none;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2px; cursor: pointer; padding: 4px 6px;
  transition: background .2s, box-shadow .2s;
}
.mb.pin { border-right: 1px solid var(--dim); }
.mb.rc  { border-left:  1px solid var(--dim); }

/* MARKED = full strong color, same intensity as PORT/STBD active */
.mb.pin.mk { background: var(--red); }
.mb.rc.mk  { background: var(--green); }
.mb:active { filter: brightness(1.25); }

.mn {
  font-family: var(--F);
  font-size: clamp(28px, 9vw, 48px);
  letter-spacing: 2px; line-height: 1; transition: color .2s;
}
.mb.pin .mn { color: var(--red); }
.mb.rc  .mn { color: var(--green); }
.mb.mk  .mn { color: #000; }

.mst {
  font-family: var(--M); font-size: 10px;
  color: var(--mut); letter-spacing: 1px; transition: color .2s;
}
.mb.mk .mst { color: rgba(0,0,0,.7); }

/* Distance panel */
.dp {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #060606; padding: 3px 7px;
  min-width: 72px;
  border-left: 1px solid var(--dim);
  border-right: 1px solid var(--dim);
}
.dpl { font-family:var(--M); font-size:8px; letter-spacing:3px; color:#222; }
#dv {
  font-family: var(--F);
  font-size: clamp(26px, 8vw, 44px);
  line-height: 1; color: #333; transition: color .3s; letter-spacing: 1px;
}
.dpu { font-family:var(--M); font-size:9px; color:#222; letter-spacing:2px; }
#ds { font-family:var(--M); font-size:8px; color:#222; text-align:center; }

/* ROW C: SOG  ~12% */
.rc-sog {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  gap: 8px; border-top: 1px solid var(--dim); background: #060606;
}
.sl  { font-family:var(--M); font-size:10px; letter-spacing:4px; color:#2a2a2a; }
#arr { font-size:16px; color:#2a2a2a; transition:color .3s; }
#sv  {
  font-family: var(--F);
  font-size: clamp(24px, 7vw, 40px);
  color: var(--green); line-height:1; letter-spacing:1px;
}
.su { font-family:var(--M); font-size:10px; color:#2a2a2a; }

/* ── LANDSCAPE pre-start ── */
.body.land #pre-body { flex-direction: row; }

.body.land .ra {
  flex: 1; flex-direction: column;
  border-right: 1px solid var(--dim); border-bottom: none;
  padding: 4px 10px;
}
.body.land #timer { font-size: clamp(58px, 15vw, 110px); }

.body.land .rb {
  flex: 1;
  border-top: none; border-left: 1px solid var(--dim);
  flex-direction: column; display: flex;
  grid-template-columns: unset;
}
.body.land .rb .line-row-inner {
  flex: 1;
  display: grid; grid-template-columns: 1fr auto 1fr;
  min-height: 0;
}
.body.land .mb.pin { border-right: 1px solid var(--dim); border-left: none; }
.body.land .mb.rc  { border-left: 1px solid var(--dim); border-right: none; }

.body.land .rc-sog {
  flex: 0 0 34px; border-top: 1px solid var(--dim);
}

/* ══════════════════════════════════════════════
   TACTICAL — portrait
   HDG 50% | mid row 20% | SIDES 30%
══════════════════════════════════════════════ */
#tac-body {
  flex: 1; display: flex; flex-direction: column; min-height: 0;
}

/* GO strip */
#gos {
  flex: 0 0 0; overflow: hidden;
  background: var(--green);
  font-family: var(--F); font-size: 18px; letter-spacing: 8px; color: #000;
  display: flex; align-items: center; justify-content: center;
  transition: flex-basis .4s;
}
#gos.show { flex: 0 0 42px; }

/* HEADING */
.th {
  flex: 0 0 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-bottom: 2px solid var(--dim); padding: 0 2px;
}
.tlb { font-family:var(--M); font-size:9px; letter-spacing:6px; color:#1e1e1e; margin-bottom:-4px; }
#hd {
  font-family: var(--F);
  font-size: min(40vw, 27vh);
  line-height: .84; color: #fff; white-space: nowrap;
}

/* MID ROW: SOG + SHIFT */
.tmid {
  flex: 0 0 20%;
  display: grid; grid-template-columns: 1fr 1fr;
  border-bottom: 2px solid var(--dim);
}
.tsog {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-right: 1px solid var(--dim); background: #060606;
}
.sog-l { font-family:var(--M); font-size:9px; letter-spacing:4px; color:#2a2a2a; }
#ts {
  font-family: var(--F);
  font-size: min(12vw, 9vh);
  color: var(--green); line-height: 1; letter-spacing: 1px;
}
.sog-u { font-family:var(--M); font-size:10px; color:#2a2a2a; }

.tshf {
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
#sha { font-size: min(11vw, 8.5vh); color:#333; transition:color .3s; line-height:1; }
#shn {
  font-family: var(--F);
  font-size: min(15vw, 11vh);
  line-height:1; color:#333; transition:color .3s;
}
.shm { display:flex; flex-direction:column; align-items:center; gap:0; }
.shd { font-family:var(--M); font-size:11px; color:#333; align-self:flex-end; margin-bottom:4px; }
.shl { font-family:var(--M); font-size:8px; color:#333; letter-spacing:3px; }

/* BABOR / ESTRIBOR */
.tsides {
  flex: 0 0 30%;
  display: grid; grid-template-columns: 1fr 1fr;
}
.sc {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 1px; cursor: pointer; position: relative; padding: 4px;
  transition: background .2s;
}
.sc.bab  { background: #0d0202; border-right: 1px solid var(--dim); }
.sc.est  { background: #020d03; }
.sc.bab.act { background: var(--red); }
.sc.est.act { background: var(--green); }
.sc.act .sct, .sc.act .scs { color: #000 !important; }

/* white number box */
.scd { background:#fff; border-radius:5px; padding:1px 8px; display:inline-block; transition:background .2s; }
.sc.act .scd { background: rgba(0,0,0,.18); }
.sch {
  font-family: var(--F);
  font-size: min(11vw, 8vh);
  color: #000; line-height: 1;
}
.sc.act .sch { color: #000; }

.sct { font-family:var(--F); font-size:clamp(12px,3.5vw,20px); letter-spacing:3px; }
.sc.bab .sct { color: var(--red); }
.sc.est .sct { color: var(--green); }
.scs { font-family:var(--M); font-size:9px; color:var(--mut); letter-spacing:1px; }

.favb {
  position:absolute; top:3px; right:4px;
  background:var(--yel); color:#000;
  font-family:var(--M); font-size:8px; font-weight:700;
  padding:2px 5px; border-radius:6px; letter-spacing:1px;
  opacity:0; transition:opacity .3s;
}
.sc.fav .favb { opacity:1; }

/* ── LANDSCAPE tactical ──
   Left col: HDG + SOG   Right col: SHIFT + SIDES
   Achieved by JS adding .land to body
*/
.body.land #tac-body { flex-direction: row; }

.body.land .th {
  flex: 1; border-bottom: none; border-right: 2px solid var(--dim);
  padding: 4px;
}
.body.land #hd { font-size: min(26vw, 34vh); }
.body.land #gos { display: none !important; }

.body.land .tmid {
  flex: 0 0 24%; display: flex; flex-direction: column;
  border-bottom: none; border-right: 1px solid var(--dim);
  grid-template-columns: unset;
}
.body.land .tsog {
  flex: 1; border-right: none; border-bottom: 1px solid var(--dim);
}
.body.land #ts { font-size: min(9vw, 12vh); }

.body.land .tshf { flex: 1; }
.body.land #sha  { font-size: min(9vw, 11vh); }
.body.land #shn  { font-size: min(12vw, 14vh); }

.body.land .tsides {
  flex: 1; display: flex; flex-direction: column;
  grid-template-columns: unset;
}
.body.land .sc.bab { border-right: none; border-bottom: 1px solid var(--dim); }
.body.land .sch { font-size: min(9vw, 10vh); }

/* ══ COUNTDOWN ══════════════════════════════════ */
#cov {
  position:fixed; inset:0; background:#000; z-index:200;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  opacity:0; pointer-events:none; transition:opacity .3s;
}
#cov.vis { opacity:1; pointer-events:all; }
#cn { font-family:var(--F); font-size:52vw; line-height:1; color:var(--yel); }
#cg { font-family:var(--F); font-size:32vw; letter-spacing:6px;
      color:var(--green); text-shadow:0 0 60px var(--green); display:none; }
</style>
</head>
<body class="body">
<div id="sem"></div>

<!-- ══ PRE-START ════════════════════════════════ -->
<div class="scr" id="s1">
  <div class="hdr">
    <div class="gps"><div class="gdot"></div><span id="gl">INIT</span></div>
    <span class="htit">PRE-START</span>
    <div class="hbtns">
      <button class="hb hb-r" onclick="resetAll()">⟳ RST</button>
      <button class="hb hb-g" onclick="goTac()">TAC →</button>
    </div>
  </div>

  <div id="pre-body">
    <div class="ra">
      <div id="sw">——</div>
      <div id="sd">SET PIN &amp; RC PARA CALCULAR</div>
      <div id="el"></div>
      <div class="tlbl">CRONÓMETRO</div>
      <div id="timer" onclick="syncTimer()">05:00</div>
      <div class="thint">↑ TAP = SYNC</div>
      <div class="trow">
        <button class="tadj" onclick="adjTime(-60)">−1M</button>
        <button id="bst" onclick="toggleTimer()">START</button>
        <button class="tadj" onclick="adjTime(+60)">+1M</button>
      </div>
    </div>

    <div class="rb">
      <!-- wrapper for landscape grid -->
      <div class="line-row-inner" style="display:grid;grid-template-columns:1fr auto 1fr;flex:1;min-height:0">
        <button class="mb pin" id="bp" onclick="markLine('PIN')">
          <span class="mn">PIN</span>
          <span class="mst" id="ps">TAP</span>
        </button>
        <div class="dp">
          <span class="dpl">DIST</span>
          <div id="dv">--</div>
          <div class="dpu">M</div>
          <div id="ds"></div>
        </div>
        <button class="mb rc" id="br" onclick="markLine('RC')">
          <span class="mn">RC</span>
          <span class="mst" id="rs">TAP</span>
        </button>
      </div>
      <div class="rc-sog">
        <span class="sl">SOG</span>
        <span id="arr">→</span>
        <span id="sv">0.0</span>
        <span class="su">KTS</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ TACTICAL ══════════════════════════════════ -->
<div class="scr off" id="s2">
  <div class="hdr">
    <div class="hlbtns">
      <button class="hb hb-r" onclick="resetAll()">⟳ RST</button>
    </div>
    <span class="htit">TÁCTICA</span>
    <div class="hbtns">
      <button class="hb hb-y" onclick="goPreStart()">← PRE</button>
    </div>
  </div>

  <div id="gos">🚩 GO — LARGADA</div>

  <div id="tac-body">
    <div class="th">
      <div class="tlb">RUMBO</div>
      <div id="hd">000°</div>
    </div>

    <div class="tmid">
      <div class="tsog">
        <span class="sog-l">SOG</span>
        <span id="ts">0.0</span>
        <span class="sog-u">KTS</span>
      </div>
      <div class="tshf">
        <span id="sha">▲</span>
        <span id="shn">--</span>
        <div class="shm">
          <span class="shd">°</span>
          <span class="shl">SHIFT</span>
        </div>
      </div>
    </div>

    <div class="tsides">
      <div class="sc bab" id="cb" onclick="selectSide('bab')">
        <span class="favb">FAVORITO</span>
        <span class="sct">BABOR</span>
        <div class="scd"><span class="sch" id="vb">---°</span></div>
        <span class="scs" id="sbb">TAP PARA SET</span>
      </div>
      <div class="sc est" id="ce" onclick="selectSide('est')">
        <span class="favb">FAVORITO</span>
        <span class="sct">ESTRIBOR</span>
        <div class="scd"><span class="sch" id="ve">---°</span></div>
        <span class="scs" id="sbe">TAP PARA SET</span>
      </div>
    </div>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="cov"><div id="cn"></div><div id="cg">GO</div></div>

<script>
const S={
  sec:300,run:false,hdg:45,spd:0,
  lat:null,lon:null,
  pLa:null,pLo:null,rLa:null,rLo:null,
  pinSet:false,rcSet:false,apSpd:0,
  babRef:null,estRef:null,act:null,
  trans:false,_sh:45,_sd:65,_sa:.45
};

/* ── GPS ── */
function startGPS(){
  if(!navigator.geolocation)return;
  let la=null,lo=null,t=null;
  navigator.geolocation.watchPosition(p=>{
    const{latitude:a,longitude:o,heading:h,speed:sp}=p.coords;
    S.lat=a;S.lon=o;
    if(h!=null&&!isNaN(h))S.hdg=h;
    if(sp!=null)S.spd=sp*1.94384;
    if(la!=null&&S.pinSet&&S.rcSet){
      const d1=dtl(la,lo),d2=dtl(a,o),dt=(p.timestamp-t)/1000;
      if(dt>0)S.apSpd=(d1-d2)/dt;
    }
    la=a;lo=o;t=p.timestamp;
    $t('gl','GPS OK');
  },null,{enableHighAccuracy:true,maximumAge:500});
}

/* ── Geometry ── */
const rd=d=>d*Math.PI/180;
function dtl(la,lo){
  if(!S.pinSet||!S.rcSet)return null;
  const R=6371000;
  const[a1,o1,a2,o2,a0,o0]=[rd(S.pLa),rd(S.pLo),rd(S.rLa),rd(S.rLo),rd(la),rd(lo)];
  const d13=2*Math.asin(Math.sqrt(Math.sin((a0-a1)/2)**2+Math.cos(a1)*Math.cos(a0)*Math.sin((o0-o1)/2)**2));
  const b13=Math.atan2(Math.sin(o0-o1)*Math.cos(a0),Math.cos(a1)*Math.sin(a0)-Math.sin(a1)*Math.cos(a0)*Math.cos(o0-o1));
  const b12=Math.atan2(Math.sin(o2-o1)*Math.cos(a2),Math.cos(a1)*Math.sin(a2)-Math.sin(a1)*Math.cos(a2)*Math.cos(o2-o1));
  return Math.asin(Math.sin(d13)*Math.sin(b13-b12))*R;
}

/* ── Marks ── */
function markLine(tp){
  const la=S.lat??(-34.5+Math.random()*.002),lo=S.lon??(-58.4+Math.random()*.002);
  if(tp==='PIN'){
    S.pinSet=true;S.pLa=la;S.pLo=lo;
    $t('ps',S.lat?'✓ SET':'✓ SIM');
    q('bp').classList.add('mk');
  }else{
    S.rcSet=true;S.rLa=la;S.rLo=lo;
    $t('rs',S.lat?'✓ SET':'✓ SIM');
    q('br').classList.add('mk');
  }
  updateUI();
}

/* ── Timer ── */
function toggleTimer(){
  S.run=!S.run;
  const b=q('bst');if(!b)return;
  b.textContent=S.run?'STOP':'START';
  b.style.background=S.run?'var(--red)':'#00c853';
  b.style.color=S.run?'#fff':'#000';
  b.style.boxShadow=S.run?'0 0 18px rgba(255,26,26,.45)':'0 0 18px rgba(0,200,83,.45)';
  b.classList.toggle('run',S.run);
}
function syncTimer(){const n=Math.ceil((S.sec+1)/60)*60;S.sec=n>600?60:n;updateUI();}
function adjTime(v){S.sec=Math.max(0,Math.min(600,S.sec+v));updateUI();}

/* ── Status calc ── */
function calcSt(){
  if(!S.pinSet||!S.rcSet||!S.run)return null;
  const dist=S.lat!=null?dtl(S.lat,S.lon):S._sd;
  const appr=S.lat!=null?S.apSpd:S._sa;
  if(dist<-5)return{st:'OCS',dist,tL:null,df:null};
  const tL=appr>.05?dist/appr:null;
  if(!tL)return{st:'STOP',dist,tL:null,df:null};
  const df=tL-S.sec;
  return{st:Math.abs(df)<=10?'OK':df<-10?'EARLY':'LATE',dist,tL,df};
}

/* ── Side select ── */
function selectSide(side){
  S.act=side;const h=Math.round(S.hdg);
  if(side==='bab'){
    S.babRef=h;
    $t('vb',h+'°');$t('sbb','REF SET');
  }else{
    S.estRef=h;
    $t('ve',h+'°');$t('sbe','REF SET');
  }
  q('cb').classList.toggle('act',side==='bab');
  q('ce').classList.toggle('act',side==='est');
  updateUI();
}

/* ── Navigation ── */
function goTac(){q('s1').classList.add('off');q('s2').classList.remove('off');}
function goPreStart(){q('s2').classList.add('off');q('s1').classList.remove('off');}

function triggerGo(){
  if(S.trans)return;S.trans=true;
  const ov=q('cov'),nEl=q('cn'),gEl=q('cg');
  ov.classList.add('vis');let c=3;nEl.textContent=c;
  const t=setInterval(()=>{
    c--;if(c>0){nEl.textContent=c;}
    else{
      clearInterval(t);nEl.style.display='none';gEl.style.display='block';
      setTimeout(()=>{
        ov.classList.remove('vis');
        q('gos').classList.add('show');
        goTac();
        setTimeout(()=>q('gos').classList.remove('show'),3500);
      },800);
    }
  },900);
}

function resetAll(){
  S.sec=300;S.run=false;S.pinSet=false;S.rcSet=false;
  S.babRef=null;S.estRef=null;S.act=null;S.trans=false;
  S._sd=65;S._sa=.45;S.apSpd=0;
  ['bp','br'].forEach(id=>q(id).classList.remove('mk'));
  $t('ps','TAP');$t('rs','TAP');
  const b=q('bst');if(b){b.textContent='START';b.style.background='#00c853';
    b.style.color='#000';b.style.boxShadow='0 0 18px rgba(0,200,83,.45)';b.classList.remove('run');}
  $t('vb','---°');$t('ve','---°');
  $t('sbb','TAP PARA SET');$t('sbe','TAP PARA SET');
  q('cb').classList.remove('act','fav');
  q('ce').classList.remove('act','fav');
  q('cn').style.display='block';q('cg').style.display='none';
  q('gos').classList.remove('show');
  q('sem').style.cssText='opacity:0';
  const sw=q('sw');if(sw){sw.textContent='——';sw.className='';}
  goPreStart();updateUI();
}

/* ── Helpers ── */
const q=id=>document.getElementById(id);
function $t(id,v){const e=q(id);if(e)e.textContent=v;}
function $s(id,p,v){const e=q(id);if(e)e.style[p]=v;}

/* ── Landscape detection via JS ──
   Uses window.orientation (iOS) and screen.orientation (Android)
   Adds/removes .land class on body
   This works even when installed as PWA on iOS
*/
function checkOrientation(){
  let isLand=false;
  if(typeof window.orientation!=='undefined'){
    isLand=Math.abs(window.orientation)===90;
  }else if(screen.orientation){
    isLand=screen.orientation.type.includes('landscape');
  }else{
    isLand=window.innerWidth>window.innerHeight;
  }
  document.querySelector('.body').classList.toggle('land',isLand);
}
window.addEventListener('orientationchange',()=>setTimeout(checkOrientation,150));
window.addEventListener('resize',checkOrientation);
checkOrientation();

/* ── Main UI update ── */
function updateUI(){
  // Timer
  const m=Math.floor(S.sec/60),s=S.sec%60;
  const ts=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  const tc=S.sec<=30&&S.run?'danger':S.sec<=90&&S.run?'warn':'';
  const te=q('timer');if(te){te.textContent=ts;te.className=tc;}

  // SOG
  const sp=S.spd.toFixed(1);
  ['sv','ts'].forEach(id=>$t(id,sp));
  const ap=S.lat!=null?S.apSpd:S._sa;
  const at=ap>.3?'▲':ap<-.1?'▼':'→';
  const ac=ap>.3?'var(--green)':ap<-.1?'var(--red)':'#2a2a2a';
  $t('arr',at);$s('arr','color',ac);

  // Status
  const st=calcSt();
  const sem=q('sem');
  const sw=q('sw');
  if(!st){
    if(sw){sw.textContent='——';sw.className='';}
    $t('sd','SET PIN & RC PARA CALCULAR');$t('el','');
    sem.style.cssText='opacity:0';
  }else{
    let w,c,sc='',ss='opacity:0',d='',e='';
    const abs=Math.round(Math.abs(st.dist??0));
    if(st.st==='OCS'){
      w='¡OCS!';c='var(--red)';sc='ocs';ss='background:var(--red);opacity:.35';
      d=`${abs}m PASASTE LA LÍNEA`;
    }else if(st.st==='EARLY'){
      w='TEMPRANO';c='var(--red)';sc='ear';ss='background:var(--red);opacity:.18';
      d=`${Math.abs(Math.round(st.df))}s ANTES DEL CAÑÓN — FRENATE`;
      e=st.tL?`ETA LÍNEA: ${Math.round(st.tL)}s`:'';
    }else if(st.st==='OK'){
      w='EN TIEMPO';c='var(--green)';sc='ok';ss='background:var(--green);opacity:.15';
      d='APPROACH PERFECTO';
      e=st.tL?`ETA LÍNEA: ${Math.round(st.tL)}s`:'';
    }else if(st.st==='LATE'){
      w='TARDE';c='var(--ora)';sc='lat';ss='background:var(--ora);opacity:.18';
      d=`${Math.abs(Math.round(st.df))}s DESPUÉS — ACELERÁ`;
      e=st.tL?`ETA LÍNEA: ${Math.round(st.tL)}s`:'';
    }else{w='——';c='var(--mut)';}
    if(sw){sw.textContent=w;sw.className=sc;}
    $t('sd',d);$t('el',e);
    sem.style.cssText=ss;
  }

  // Distance
  const dv=q('dv'),ds=q('ds');
  if(dv&&ds){
    if(!st||st.dist==null){dv.textContent='--';dv.style.color='#333';ds.textContent='';}
    else{
      const abs=Math.round(Math.abs(st.dist));dv.textContent=abs;
      if(st.dist<-5){dv.style.color='var(--red)';ds.textContent='⚠ OCS';ds.style.color='var(--red)';}
      else if(abs<=5){dv.style.color='var(--green)';ds.textContent='EN LÍNEA';ds.style.color='var(--green)';}
      else{dv.style.color='#fff';ds.textContent=st.dist>0?'ABAJO':'ENCIMA';ds.style.color='#555';}
    }
  }

  // Heading
  $t('hd',String(Math.round(S.hdg)).padStart(3,'0')+'°');

  // Shift — tack-aware, BABOR/ESTRIBOR
  const ref=S.act==='bab'?S.babRef:S.estRef;
  if(ref!==null){
    let d=Math.round(S.hdg-ref);
    if(d>180)d-=360;if(d<-180)d+=360;

    let iL,iH;
    if(S.act==='bab'){iH=d>0;iL=d<0;}
    else             {iH=d<0;iL=d>0;}

    const col=iL?'var(--green)':iH?'var(--red)':'#fff';
    const arw=iL?'▲':iH?'▼':'→';
    const lbl=iL?'PRESTADO':iH?'NEGADO':'IGUAL';

    const sn=q('shn'),sa=q('sha');
    if(sn){sn.textContent=Math.abs(d);sn.style.color=col;}
    if(sa){sa.textContent=arw;sa.style.color=col;}

    const sb=q('sbb'),se=q('sbe');
    if(sb&&S.act==='bab')sb.textContent=lbl;
    if(se&&S.act==='est')se.textContent=lbl;

    const pF=S.babRef!==null&&S.act!=='bab'&&d<0;
    const eF=S.estRef!==null&&S.act!=='est'&&d>0;
    const cb=q('cb'),ce=q('ce');
    if(cb)cb.classList.toggle('fav',pF);
    if(ce)ce.classList.toggle('fav',eF);
  }
}

/* ── Simulation ── */
setInterval(()=>{
  if(S.run&&S.sec>0){S.sec--;if(S.sec===0&&!S.trans)triggerGo();}
  if(S.lat==null){
    S._sh=((S._sh??45)+(Math.random()-.48)*2+360)%360;
    S.hdg=S._sh;S.spd=5.0+Math.random()*.8;
    if(S.pinSet&&S.rcSet&&S.run){S._sa=.4+Math.random()*.2;S._sd=Math.max(-15,S._sd-S._sa);}
  }
  updateUI();
},1000);

startGPS();
updateUI();

/* ── Wake Lock ── */
(async()=>{
  try{
    if('wakeLock' in navigator){
      let wl=await navigator.wakeLock.request('screen');
      document.addEventListener('visibilitychange',async()=>{
        if(document.visibilityState==='visible')wl=await navigator.wakeLock.request('screen');
      });
    }
  }catch(e){}
})();

/* ── SW ── */
if('serviceWorker' in navigator)
  window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}));
</script>
